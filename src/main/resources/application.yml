server:
  port: 8080

spring:
  application:
    name: contas-a-pagar-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:contas_pagar}
    username: ${DB_USER:contas_pagar}
    password: ${DB_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD}

app:
  importacao:
    diretorio: ${IMPORTACAO_DIRETORIO:/app/data/importacoes}
  rabbitmq:
    exchange: contas-pagar.exchange
    queue: fila.importacao
    routing-key: importacao.processar
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  security:
    admin-user: ${ADMIN_USER:admin}
    admin-password-hash: ${ADMIN_PASSWORD_HASH}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
